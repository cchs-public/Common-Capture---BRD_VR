<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Custom Levels Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="CCLogo.png">
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #9b5cff;
            --accent-yellow: #ffd84d;
            --glow-purple: rgba(155, 92, 255, 0.4);
            --glow-yellow: rgba(255, 216, 77, 0.4);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-dark);
            background-image:
                radial-gradient(circle at 0% 0%, var(--glow-purple) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, var(--glow-yellow) 0%, transparent 40%);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .level-panel {
            width: 450px;
            max-width: 95%;
            padding: 30px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        h1 { margin: 0; font-size: 2.5rem; letter-spacing: 4px; text-transform: uppercase; }
        .subtitle { opacity: 0.7; margin: 10px 0 20px; font-size: 0.9rem; }

        .question-tile {
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0,0,0,0.3);
            color: white;
        }

        .list {
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
        }

        button {
            padding: 12px;
            font-size: 0.9rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--accent-purple);
            color: white;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.02); background: #af7dff; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .hidden { display: none; }
        
        .complete-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            display: none; align-items: center; justify-content: center;
        }
        .complete-overlay.active { display: flex; }
    </style>
</head>

<body>

    <div class="level-panel" id="builder">
        <h1>BUILDER</h1>
        <div class="subtitle">Create questions for "Common Capture"</div>

        <div class="question-tile">
            <input id="setTitle" placeholder="Set Title (e.g. Classic History)">
            <input id="newQ" placeholder="Question Text">
            <input id="newA" placeholder="Answer">
            <div id="builderFeedback" style="color:var(--accent-yellow); font-size:0.8rem;"></div>
        </div>

        <button style="width:100%" onclick="addQuestion()">Add Question</button>

        <div class="list" id="questionList">No questions yet.</div>

        <div class="btn-group">
            <button onclick="importQuestions()">Import JSON</button>
            <button onclick="exportQuestions()">Export JSON</button>
        </div>

        <div class="btn-group">
            <button style="background:#444" onclick="location.href='CCMenu1.html'">Menu</button>
            <button style="background:var(--accent-yellow); color:black" onclick="startGame()">Play Set (export first!)</button>
        </div>
    </div>

    <div class="level-panel hidden" id="game">
        <h1 id="levelHeading">LEVEL 1</h1>
        <div class="subtitle" id="questionText">Loading...</div>

        <div class="question-tile">
            <input id="answerInput" placeholder="Your Answer">
            <div id="feedback" style="color:var(--accent-yellow); font-weight:bold;"></div>
        </div>

        <div class="btn-group">
            <button style="background:#444" onclick="location.reload()">Quit</button>
            <button onclick="checkAnswer()">Submit</button>
        </div>
    </div>

    <div class="complete-overlay" id="completeOverlay">
        <div class="level-panel">
            <h1>CLEARED</h1>
            <button onclick="nextLevel()" style="width:100%">Continue</button>
        </div>
    </div>

    <script>
        // Use an array to match your Preset structure exactly
        let activePreset = {
            title: "Custom Set",
            color1: "#9b5cff",
            color2: "#ffd84d",
            levels: []
        };
        
        let currentLevelIdx = 0;

        /* --- BUILDER LOGIC --- */
        function addQuestion() {
            const q = document.getElementById('newQ').value.trim();
            const a = document.getElementById('newA').value.trim();
            
            if (!q || !a) return;

            activePreset.levels.push({ q, a });
            document.getElementById('newQ').value = "";
            document.getElementById('newA').value = "";
            renderList();
        }

        function renderList() {
            const list = document.getElementById('questionList');
            if (activePreset.levels.length === 0) {
                list.innerHTML = "No questions yet.";
                return;
            }
            list.innerHTML = activePreset.levels.map((lvl, i) => 
                `<div>${i+1}. ${lvl.q} <span style="opacity:0.5">(${lvl.a})</span></div>`
            ).join('<br>');
        }

        function exportQuestions() {
            if (activePreset.levels.length === 0) return alert("Add questions first!");
            
            // Set the title from the input or default
            const titleInput = document.getElementById('setTitle').value.trim();
            if(titleInput) activePreset.title = titleInput;

            const blob = new Blob([JSON.stringify(activePreset, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `${activePreset.title.replace(/\s+/g, '_')}.json`;
            link.click();
        }

        function importQuestions() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = ".json";
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = event => {
                    const data = JSON.parse(event.target.result);
                    // Standardize: if it has .levels, use it. If not, assume it's an array.
                    activePreset = {
                        title: data.title || "Imported Set",
                        color1: data.color1 || "#9b5cff",
                        color2: data.color2 || "#ffd84d",
                        levels: data.levels || []
                    };
                    document.getElementById('setTitle').value = activePreset.title;
                    renderList();
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        /* --- TEST PLAY LOGIC --- */
        function startGame() {
            if (activePreset.levels.length === 0) return alert("No levels to play.");
            document.getElementById('builder').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            currentLevelIdx = 0;
            loadLevel();
        }

        function loadLevel() {
            const lvl = activePreset.levels[currentLevelIdx];
            document.getElementById('levelHeading').textContent = `LEVEL ${currentLevelIdx + 1}`;
            document.getElementById('questionText').textContent = lvl.q;
            document.getElementById('answerInput').value = "";
            document.getElementById('feedback').textContent = "";
        }

        function checkAnswer() {
            const input = document.getElementById('answerInput').value.trim();
            const correct = activePreset.levels[currentLevelIdx].a;

            if (input.toLowerCase() === correct.toLowerCase()) {
                document.getElementById('completeOverlay').classList.add('active');
            } else {
                document.getElementById('feedback').textContent = "INCORRECT. TRY AGAIN.";
            }
        }

        function nextLevel() {
            document.getElementById('completeOverlay').classList.remove('active');
            currentLevelIdx++;
            if (currentLevelIdx < activePreset.levels.length) {
                loadLevel();
            } else {
                alert("SET COMPLETE!");
                location.reload();
            }
        }
    </script>
</body>
</html>
