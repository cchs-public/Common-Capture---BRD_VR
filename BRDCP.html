<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Command Prompt</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-dark: #050505;
            --accent-red: #ff1f1f;
            --accent-blue: #0077ff;
            --glow-red: rgba(255, 31, 31, 0.4);
            --glow-blue: rgba(0, 119, 255, 0.4);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 0% 0%, var(--glow-red) 0%, transparent 40%),
                              radial-gradient(circle at 100% 100%, var(--glow-blue) 0%, transparent 40%);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .terminal-panel {
            width: 550px;
            max-width: 95%;
            height: 400px;
            padding: 25px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            font-family: 'Consolas', monospace;
            font-size: 1rem;
            color: #efefef;
        }

        .input-line {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px 15px;
        }

        .prompt {
            color: #888;
            margin-right: 12px;
            font-weight: bold;
        }

        input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        .log-entry { margin-bottom: 5px; }
        .error-text { color: var(--accent-red); }
        .system-text { color: var(--accent-blue); }

        #output::-webkit-scrollbar { width: 4px; }
        #output::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div class="terminal-panel">
    <div id="output">
        <div class="log-entry">Use commands here. (or in a level textbox) [I HAVE NOT CONFIRMED THIS WORKS YET.]</div>
    </div>

    <div class="input-line">
        <span class="prompt">></span>
        <input type="text" id="termInput" autofocus autocomplete="off" spellcheck="false">
    </div>
</div>

<script>
    const termInput = document.getElementById('termInput');
    const output = document.getElementById('output');
    
    // --- State Management ---
    const params = new URLSearchParams(location.search);
    let requestedPreset = params.get("p") || params.get("preset");
    let currentLevel = parseInt(params.get("l")) || 1;
    let preset = null;
    let TOTAL_LEVELS = 0;

    // Load Data
    if (requestedPreset) {
        fetch(`presets/${requestedPreset}`)
            .then(res => res.json())
            .then(data => {
                preset = data;
                TOTAL_LEVELS = preset.levels.length;
                print("Level data loaded.");
                print(`Current Question: ${preset.levels[currentLevel-1].q}`);
            })
            .catch(() => print("Error loading level.", "error-text"));
    }

    termInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = termInput.value.trim();
            if (val) processCommand(val);
            termInput.value = '';
        }
    });

    function print(text, className = "") {
        const div = document.createElement('div');
        div.className = `log-entry ${className}`;
        div.textContent = text;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    function processCommand(input) {
        print(`> ${input}`);

        // Check Dev Commands
        if (handleDevCommands(input)) return;

        // Check Answer
        if (preset) {
            const correct = preset.levels[currentLevel - 1].a;
            if (input === correct) {
                print("Correct. Loading next...", "system-text");
                setTimeout(() => jumpTo(currentLevel + 1), 800);
            } else if (input.toLowerCase() === "clear") {
                output.innerHTML = '';
            } else {
                print("Incorrect input.", "error-text");
            }
        }
    }

    function jumpTo(level) {
        if (level < 1) return;
        if (level > TOTAL_LEVELS) {
            location.href = "BRDCred+Specials.html";
            return;
        }
        location.href = `BRDCP.html?p=${requestedPreset}&l=${level}`;
    }

    function handleDevCommands(input) {
        const v = input.toUpperCase();
        if (v === "BRDNEXT") { jumpTo(currentLevel + 1); return true; }
        if (v === "BRDPREV") { jumpTo(currentLevel - 1); return true; }
        if (v.startsWith("BRDSKIP")) {
            const t = parseInt(v.replace("BRDSKIP", ""));
            if (!isNaN(t)) jumpTo(t);
            return true;
        }
        if (v === "BRDBUILD") { location.href = "BRDBuilder.html"; return true; }
        return false;
    }

    // Autofocus
    document.addEventListener('click', () => termInput.focus());
</script>

</body>
</html>
